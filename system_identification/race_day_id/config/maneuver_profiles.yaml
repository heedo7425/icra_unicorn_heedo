# Per-maneuver profiles. Keys must match maneuvers/<name>.py.

ramp_steer:
  enabled: true
  v_target: 3.0           # m/s
  start_angle: 0.10       # rad
  end_angle: 0.40         # rad
  angle_time: 20.0        # s (ramp duration)
  # id_controller Exp5 remap target
  drive_topic: /vesc/high_level/ackermann_cmd_mux/input/nav_1

steady_circle:
  enabled: true
  delta_fixed: 0.25       # rad
  v_levels: [1.0, 1.5, 2.0, 2.5, 3.0]
  dwell_s: 3.0
  radius_min_m: 2.0
  ay_sat_ratio: 0.3       # abort if |ay| < ay_sat_ratio * expected

slalom:
  enabled: true
  amplitude_rad: 0.20
  freq_start_hz: 0.5
  freq_end_hz: 2.0
  sweep_s: 10.0
  v_fixed: 2.5
  figure_eight: false
  lateral_abort_m: 2.5

free_lap:
  enabled: true
  min_vx: 1.0
  max_laps: 1
  require_gb_track: true  # only collect when state_machine reports GB_TRACK
