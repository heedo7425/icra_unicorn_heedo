relay_topics:
  # === GLIL State Estimation ===
  - input: "/glim_ros/imu_odom"
    type: "nav_msgs/Odometry"

  - input: "/glim_ros/imu_pose"
    type: "geometry_msgs/PoseStamped"

  - input: "/glim_ros/aligned_points"
    type: "sensor_msgs/PointCloud2"

  - input: "/glim_ros/aligned_points_corrected"
    type: "sensor_msgs/PointCloud2"

  - input: "/glim_ros/points"
    type: "sensor_msgs/PointCloud2"

  - input: "/glim_ros/points_corrected"
    type: "sensor_msgs/PointCloud2"

  - input: "/glim_ros/occupancy_grid"
    type: "nav_msgs/OccupancyGrid"
    latch: True

  - input: "/glim_ros/dynamic_objects"
    type: "sensor_msgs/PointCloud2"

  - input: "/glim_ros/dynamic_occupancy_grid"
    type: "nav_msgs/OccupancyGrid"

  # === 2.5D Detection ===
  - input: "/detection/filtered"
    type: "sensor_msgs/PointCloud2"

  - input: "/detection/objects"
    type: "sensor_msgs/PointCloud2"

  - input: "/detection/markers"
    type: "visualization_msgs/MarkerArray"

  - input: "/detection/ground_mask"
    type: "nav_msgs/OccupancyGrid"

  - input: "/tracking/markers"
    type: "visualization_msgs/MarkerArray"

  - input: "/tracking/poses"
    type: "geometry_msgs/PoseArray"

  - input: "/mapUGV"
    type: "nav_msgs/OccupancyGrid"
    latch: True

  - input: "/wallGrid"
    type: "nav_msgs/OccupancyGrid"
    latch: True

  # === Legacy (Hokuyo - deprecated) ===
  # - input: "/scan"
  #   type: "sensor_msgs/LaserScan"

  - input: "/car_state/pose"
    type: "geometry_msgs/PoseStamped"

  - input: "/map"
    type: "nav_msgs/OccupancyGrid"
    latch : True

  - input: "/map_new"
    type: "nav_msgs/OccupancyGrid"

  - input: "/state_marker"
