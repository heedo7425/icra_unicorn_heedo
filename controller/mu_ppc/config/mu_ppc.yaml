# Loaded under the mu_ppc node's private namespace via <rosparam command="load">.
# All keys correspond to ~params read by mu_ppc_node.py.

rate: 50

# baseline pure pursuit lookahead
ld_base_min: 0.6
ld_base_max: 3.0
ld_speed_slope: 0.30
ld_speed_intercept: 0.20
max_steer: 0.42

# zone prior
mu_zone_edge_blend: 2.0   # [m] cosine ramp at zone edges
mu_default: 1.0

# online slip detector thresholds (residual / threshold => unit slip)
slip_yaw_thr: 0.15        # |yaw_rate_meas - yaw_rate_cmd| / |cmd|
slip_long_thr: 0.10       # (v_wheel - v_body) / v_wheel
slip_ay_thr: 0.20         # (ay_expected - ay_meas) / |ay_expected|
slip_tau_up: 0.05         # fast attack [s]
slip_tau_down: 0.30       # slow release [s]

# gain scheduling endpoints (low = slipping / low-mu, high = excess grip)
ld_scale_low: 1.6
ld_scale_high: 0.8
steer_rate_low: 2.5       # [rad/s]
steer_rate_high: 8.0
ax_max_low: 2.0           # [m/s^2]
ax_max_high: 6.0
brake_low: 2.5            # |ax_min|
brake_high: 7.0

# asymmetric time constants
gain_tau_tighten: 0.08
gain_tau_relax: 0.6

# weight on map prior vs. measurement (slip-side always overrides)
prior_weight: 0.5
