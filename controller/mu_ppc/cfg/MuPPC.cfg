#!/usr/bin/env python3
PACKAGE = "controller"
from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

# Baseline PP
gen.add("ld_base_min",         double_t, 0, "min lookahead [m]",          0.6, 0.2, 2.0)
gen.add("ld_base_max",         double_t, 0, "max lookahead [m]",          3.0, 1.0, 6.0)
gen.add("ld_speed_slope",      double_t, 0, "Ld = q + m*v",               0.30, 0.0, 1.0)
gen.add("ld_speed_intercept",  double_t, 0, "Ld = q + m*v",               0.20, -0.5, 1.5)
gen.add("max_steer",           double_t, 0, "steer abs limit [rad]",      0.42, 0.1, 0.7)

# Zone prior
gen.add("mu_zone_edge_blend",  double_t, 0, "cosine ramp at edges [m]",   2.0, 0.0, 10.0)
gen.add("mu_default",          double_t, 0, "default mu",                 1.0, 0.3, 1.3)
gen.add("prior_weight",        double_t, 0, "weight on prior (0..1)",     0.5, 0.0, 1.0)

# Slip detector
gen.add("slip_yaw_thr",        double_t, 0, "yaw residual threshold",     0.15, 0.0, 1.0)
gen.add("slip_long_thr",       double_t, 0, "wheel-slip threshold",       0.10, 0.0, 1.0)
gen.add("slip_ay_thr",         double_t, 0, "ay residual threshold",      0.20, 0.0, 1.0)
gen.add("slip_tau_up",         double_t, 0, "attack tau [s]",             0.05, 0.0, 1.0)
gen.add("slip_tau_down",       double_t, 0, "release tau [s]",            0.30, 0.0, 2.0)

# Gain endpoints
gen.add("ld_scale_low",        double_t, 0, "Ld scale at slip side",      1.6, 1.0, 3.0)
gen.add("ld_scale_high",       double_t, 0, "Ld scale at grip side",      0.8, 0.4, 1.5)
gen.add("steer_rate_low",      double_t, 0, "steer rate cap on slip",     2.5, 0.5, 10.0)
gen.add("steer_rate_high",     double_t, 0, "steer rate cap on grip",     8.0, 1.0, 20.0)
gen.add("ax_max_low",          double_t, 0, "ax cap on slip",             2.0, 0.5, 8.0)
gen.add("ax_max_high",         double_t, 0, "ax cap on grip",             6.0, 1.0, 12.0)
gen.add("brake_low",           double_t, 0, "|ax_min| cap on slip",       2.5, 0.5, 8.0)
gen.add("brake_high",          double_t, 0, "|ax_min| cap on grip",       7.0, 1.0, 12.0)

gen.add("gain_tau_tighten",    double_t, 0, "tighten tau [s]",            0.08, 0.0, 1.0)
gen.add("gain_tau_relax",      double_t, 0, "relax tau [s]",              0.6,  0.0, 3.0)

exit(gen.generate(PACKAGE, "controller", "MuPPC"))
