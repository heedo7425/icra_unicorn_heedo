# ============================================================
# rls_mpc — SRX1 tuning. Independent of controller/mpc & mpc_only.
# All params under /rls_mpc/* namespace.
# ============================================================

rls_mpc:
  # --- Horizon ---
  N_horizon:        20
  dt:               0.05
  window_size:      200

  # --- State / input weights ---
  w_d:              8.0
  w_dpsi:           6.0
  w_vx:             3.0
  w_vy:             1.0
  w_omega:          3.0
  w_steer:          0.5
  w_u_steer_rate:   3.0
  w_u_accel:        0.1
  w_terminal_scale: 1.0

  # --- Limits ---
  max_steer:        0.4
  max_steer_rate:   2.0
  max_accel:        3.0
  max_decel:       -3.0
  v_min:            0.0
  v_max:           12.0

  # --- Friction (default / fallback when mu_source=static) ---
  mu_default:       0.85
  mu_margin_k:      2.0
  friction_circle:  true
  friction_margin:  0.95
  friction_slack_penalty: 1000.0

  # --- μ source abstraction (runtime selected via launch arg) ---
  # values: static | ground_truth | rls | gp
  # When != static, the MPC subscribes to /rls_mpc/mu_estimate (Float32) and
  # uses that per-tick value (broadcast to all N+1 stages). Estimator node
  # (rls/gp) or patch publisher (ground_truth) owns this topic.
  mu_source:        static
  mu_estimate_topic: /rls_mpc/mu_estimate

  # --- RLS estimator ---
  # Physically-realistic tuning:
  #   meas_sigma: IMU ay noise σ (차량 진동, body roll 등 포함 추정값).
  #   forgetting: 높을수록 과거 데이터 유지 (0.99 ≈ 수 초 window).
  #   init_sigma: 초기 불확실성. 작으면 보수적 업데이트.
  #   ay_threshold: saturation 근접 판정. 너무 낮으면 선형 영역에서
  #                 ay/g 를 잘못된 μ 측정으로 사용 → 과소추정.
  #   mu_min/max: μ̂ clipping.
  rls:
    forgetting:     0.95
    init_mu:        0.85
    init_sigma:     0.18
    meas_sigma:     0.22
    ay_threshold:   2.0
    mu_min:         0.2
    mu_max:         1.3
    peak_window_sec: 1.0

  # --- GP ensemble ---
  gp:
    ensemble_path:  /tmp/gp_ensemble_srx1.pkl
    init_mu:        0.85
    blend_temperature: 5.0
    buffer_size:    50

  # --- μ patches (2D sim multisurface viz + ground truth) ---
  # Per-map yaml path; empty = uniform mu_default everywhere.
  mu_patches_file:  ""

  # --- Node behavior ---
  loop_rate_hz:     50
  test_mode:        false
  startup_delay_s:  7.0

  warmup_vx_min:    0.2
  warmup_speed_cmd: 2.0

  reset_jump_thres_m: 1.0
  stuck_status_thres: 5

  codegen_dir:      /tmp/rls_mpc_c_generated
