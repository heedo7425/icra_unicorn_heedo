# ============================================================
# ekf_mpc — SRX1 tuning. Independent of controller/mpc & mpc_only.
# All params under /ekf_mpc/* namespace.
# ============================================================

ekf_mpc:
  # --- Horizon ---
  N_horizon:        20
  dt:               0.05
  window_size:      200

  # --- State / input weights ---
  w_d:              8.0
  w_dpsi:           6.0
  w_vx:             3.0
  w_vy:             1.0
  w_omega:          3.0
  w_steer:          0.5
  w_u_steer_rate:   3.0
  w_u_accel:        0.1
  w_terminal_scale: 1.0

  # --- Limits ---
  max_steer:        0.4
  max_steer_rate:   2.0
  max_accel:        3.0
  max_decel:       -3.0
  v_min:            0.0
  v_max:           12.0

  # --- Friction (default / fallback when mu_source=static) ---
  mu_default:       0.85
  mu_margin_k:      2.0
  friction_circle:  true
  friction_margin:  0.95
  friction_slack_penalty: 1000.0

  # --- μ source abstraction (runtime selected via launch arg) ---
  # values: static | ground_truth | rls | gp
  # When != static, the MPC subscribes to /ekf_mpc/mu_estimate (Float32) and
  # uses that per-tick value (broadcast to all N+1 stages). Estimator node
  # (rls/gp) or patch publisher (ground_truth) owns this topic.
  mu_source:        static
  mu_estimate_topic: /ekf_mpc/mu_estimate

  # --- EKF estimator (Pacejka-based) ---
  # Observation model: a_y = μ · K(v_x, v_y, ω, δ) + noise
  #   K 는 Pacejka μ-free 공식 (D·sin(C·atan(B·α − E·(...)))) 에 정상하중 ·
  #   코사인 보정·질량 역수 포함.
  # 업데이트 조건: v_x > min_speed AND |K| > min_K. 직선(α≈0)에서 K≈0 → skip.
  ekf:
    init_mu:        0.85
    init_sigma:     0.30
    proc_sigma:     0.03      # L2.3: variance 축소
    meas_sigma:     0.50      # L2.3: 약간 조인 measurement noise
    min_speed:      1.0
    min_K:          0.7       # L2.3: 중간값 — K 너무 좁으면 업데이트 부족
    mu_min:         0.35
    mu_max:         1.3
    vy_smooth_alpha: 0.35     # Level1: dvy/dt 반응 개선
    prior_pull_rate: 0.005    # Level1: softer prior pull
    # --- Level 2: Longitudinal channel ---
    long_enable:        true
    long_ax_thresh:     1.5
    long_slip_thresh:   0.5   # L2.2: 완화 (too-aggressive false positive 방지)
    long_meas_sigma:    0.45
    # --- Level 2: s-memory prior (lap-to-lap) ---
    mem_enable:         true
    mem_bin_width:      2.0   # [m], s 축 bin 크기
    mem_ema_alpha:      0.15  # L2.2
    mem_pull_rate:      0.015 # L2.2: 인접 bin 오염 완화

  # --- GP ensemble ---
  gp:
    ensemble_path:  /tmp/gp_ensemble_srx1.pkl
    init_mu:        0.85
    blend_temperature: 5.0
    buffer_size:    50

  # --- μ patches (2D sim multisurface viz + ground truth) ---
  # Per-map yaml path; empty = uniform mu_default everywhere.
  mu_patches_file:  ""

  # --- Node behavior ---
  loop_rate_hz:     50
  test_mode:        false
  startup_delay_s:  7.0

  warmup_vx_min:    0.2
  warmup_speed_cmd: 2.0

  reset_jump_thres_m: 1.0
  stuck_status_thres: 5

  codegen_dir:      /tmp/ekf_mpc_c_generated
