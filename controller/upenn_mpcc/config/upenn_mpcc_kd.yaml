upenn_mpcc:
  N_horizon: 30
  dt: 0.05
  window_size: 200
  w_d: 6
  w_dpsi: 6.6
  w_progress: 2.55
  w_progress_e: 3.0
  w_vx: 0.0
  w_vy: 0.3
  w_omega: 2.0
  w_steer: 0.3
  w_u_steer_rate: 3.0
  w_u_accel: 0.3
  w_terminal_scale: 1.0
  n_ref_max_offset: 0
  n_ref_blend_stages: 5.0
  n_ref_vx_threshold: 1.0
  max_steer: 0.4
  max_steer_rate: 3.0
  max_accel: 3.0
  max_decel: -3.0
  v_min: 0.0
  v_max: 3.249
  mu_default: 0.85
  speed_boost: 1.0
  mu_scale_exp: 0.0
  mu_margin_k: 2.0
  friction_circle: true
  friction_margin: 0.85
  friction_slack_penalty: 200.0
  mu_source: gp
  mu_estimate_topic: /upenn_mpc/mu_estimate
  gp:
    model_path: /tmp/upenn_mpc_models/latest.pth
    buffer_size: 10000
    train_epochs: 100
    train_lr: 0.05
    train_min_samples: 400
    train_max_samples: 700
    outlier_quantile: 1.0
    skip_first_sec: 3.0
    residual_clip:
    - 10.0
    - 5.0
    - 12.0
    enable_stagewise: false
    residual_enable: true
    torch_num_threads: 2
  mu_patches_file: ''
  loop_rate_hz: 50
  test_mode: false
  startup_delay_s: 1.0
  warmup_vx_min: 0.02
  warmup_speed_cmd: 2.0
  warmup_exit_vx: 0.05
  reset_jump_thres_m: 1.0
  stuck_status_thres: 5
  codegen_dir: /tmp/upenn_mpcc_c_generated
  line_source: raceline
