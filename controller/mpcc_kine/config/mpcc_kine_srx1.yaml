# ============================================================
# mpcc — minimal kinematic Liniger MPCC (no Pacejka, no friction ellipse).
# state: [X, Y, psi, v, delta, theta]
# input: [u_ddelta, u_a, vs]
# cost (NLS): qC·eC² + qL·eL² + qMu·dpsi² + qVs·(vs_target-vs)² + qV·(v_max-v)²
#             + qDelta·δ² + qDDelta·u_ddelta² + qA·u_a²
# constraints: track inner/outer half-space (soft slack), v/δ box, input box.
# ============================================================
mpcc_kine:
  # ---- Horizon / dt ----
  N_horizon:        40
  dt:               0.05
  loop_rate_hz:     50.0

  # ---- Limits ----
  v_max:            3.0
  v_min:            0.0
  max_steer:        0.4
  max_steer_rate:   3.0
  max_accel:        3.0
  max_decel:       -3.0
  vs_min:           0.0
  vs_max:           4.0      # v_max + 33% 여유 (이전 8.0 은 θ drift cold-reset 야기)
  vs_target:        3.0      # = v_max — vs 가 차 속도 따라가도록 (warm start 살림)

  # ---- Cost weights ----
  # qDelta / qDDelta 강화 — 이전 (qDelta=0, qDDelta=0.05) 에선 OCP 가 매 tick
  # 다른 local optimum 으로 jump → cmd_steer 8.5Hz 진동, pred path S 자.
  # 일반적인 Liniger MPCC: input regs 가 path-tracking 비용과 비슷한 order 여야
  # SQP_RTI 단일 iter 에서 안정 수렴.
  qC:               0.1       # contour error
  qL:               100.0     # lag error (qL >> qC)
  qMu:              0.5       # heading deviation (0.1 → 0.5; heading 도 안정화)
  qVs:              0.5       # progress reward (vs → vs_target)
  qV:               0.2       # forward push (0.5 → 0.2; 코너 over-aggressive 방지)
  qVsv:             1.0       # vs ↔ v 동기화. 0 이면 θ drift 누적 → warm start 죽음.
  qDelta:           1.0       # 0 → 1.0 — steering 절대값 페널티 (oscillation 진정)
  qDDelta:          5.0       # 0.05 → 5.0 — steering rate 강하게 penalize
  qA:               0.5       # 0.05 → 0.5 — accel 변화도 부드럽게
  qC_term:          10.0
  qL_term:          1.0

  # ---- Track soft slack ----
  track_slack_penalty: 1000.0

  # ---- Bound inset (car half-width, geometric) ----
  bound_inset:      0.10

  # ---- Solver ----
  levenberg_marquardt: 5.0

  # ---- Misc ----
  startup_delay_s:  1.0
  warm_start_max_drift: 1.5
  codegen_dir:      /tmp/mpcc_kine_codegen
