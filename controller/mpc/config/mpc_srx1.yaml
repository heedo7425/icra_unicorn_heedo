# ============================================================
# MPC tuning params for SRX1 — NOT a vehicle SoT.
# Vehicle physics params come from /shared_vehicle/vehicle_srx1.yaml
# (loaded into global namespace by launch).
# ============================================================

mpc:
  # --- Horizon ---
  N_horizon:        20       # [-] prediction steps
  dt:               0.05     # [s] step duration (50 Hz)

  # --- State / input weights (Q, R) ---
  # 보수적 튜닝 (Day 3): 공격적 weight 는 QP non-convergence + 과회전 유발.
  # State order: [s, d, delta_psi, v_x, v_y, omega, steer]
  w_d:              8.0      # moderate lateral
  w_dpsi:           6.0      # heading error (raised: n 수렴 위해 heading 선회 우선)
  w_vx:             1.0
  w_vy:             1.0      # penalize side slip
  w_omega:          3.0      # strong yaw-rate damping → anti-spin
  w_steer:          0.5

  # Input order: [u_steer_rate, u_accel]
  w_u_steer_rate:   3.0      # smooth steer (anti-chatter)
  w_u_accel:        0.5

  # --- Terminal ---
  w_terminal_scale: 1.0

  # --- Limits — slow to avoid spin, raise after lap stability ---
  max_steer:        0.4
  max_steer_rate:   2.0
  max_accel:        1.5
  max_decel:       -2.0
  v_min:            0.0
  v_max:            2.0      # raceline vx_ref 가 2.0 이하 — ceiling 만 제공

  # --- Friction circle ---
  mu_default:       0.7      # conservative cold-start
  mu_margin_k:      2.0      # μ_mpc = μ̂ − k·σ_μ̂
  friction_circle:  true

  # --- Online μ̂ (RLS) — Stage 2 ---
  mu_estimator:
    enabled:        false    # off in Stage 1, enable in Stage 2
    forgetting:     0.97
    init_value:     0.7
    init_sigma:     0.3

  # --- Watchdog — Stage 2 ---
  watchdog:
    enabled:        false
    slip_ratio_thres: 0.25
    sideslip_thres:   0.35   # [rad]
    vref_clamp_factor: 0.7

  # --- Node behavior ---
  loop_rate_hz:     50       # SQP_RTI+QPOASES is fast (~10ms); 50Hz OK
  test_mode:        false    # Day 1 stub; past Day 1, real MPC on
  startup_delay_s:  7.0      # hold zero cmd while spawn_on_waypoint teleports car

  # Warm-up override (vx < threshold → force forward push, bypass MPC solution).
  # Needed because Pacejka bicycle Hessian is near-singular at vx≈0.
  warmup_vx_min:    0.4      # [m/s] — lower since v_max is low
  warmup_speed_cmd: 0.8      # [m/s]
