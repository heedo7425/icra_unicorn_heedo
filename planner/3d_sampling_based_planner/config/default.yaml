# Default params for 3d_sampling_based_planner (observation mode).
# Tuned conservatively for 1/10 RC car, ~15 m/s peak.

rate_hz: 10.0
frame_id: map

# Horizon & sampling grid
horizon:      1.0    # seconds of prediction (RC car scale; upstream default 3.0 for ~40 m/s)
num_samples:  30     # time discretization per candidate (→ dt ≈ 0.033s at horizon=1.0)
n_samples:    11     # lateral offset samples
v_samples:    5      # velocity samples

# Safety / physics
safety_distance: 0.20    # 20 cm — track bound clearance for 1/10 RC car (~0.3 m wide)
gg_abs_margin:   0.0
gg_margin_rel:   0.0
friction_check_2d: false
s_dot_min:       1.0
kappa_thr:       0.1

relative_generation: true

cost:
  raceline_weight:   0.1
  velocity_weight:   100.0
  prediction_weight: 5000.0
