#!/usr/bin/env python
# Dynamic reconfigure for the state-aware sampling planner.
# Exposed per-instance; each sampling_planner_state_node manages its own server.
#
# Cost term additions here also require matching self.w_* handling inside
# node/sampling_planner_state_node.py (see _weight_cb and _build_cost_weight_dict).

PACKAGE = "sampling_based_planner_3d"

from dynamic_reconfigure.parameter_generator_catkin import ParameterGenerator, double_t, bool_t

gen = ParameterGenerator()

# --- Core cost weights (free to extend per state) -------------------------------------------------
gen.add("raceline_weight",   double_t, 0, "Lateral offset from raceline (d - d_raceline)^2",                   0.1,    0.0, 10000.0)
gen.add("velocity_weight",   double_t, 0, "Speed tracking vs raceline ((V - V_raceline)/V_raceline)^2",        100.0,  0.0, 10000.0)
gen.add("prediction_weight", double_t, 0, "Opponent prediction avoidance (exp Gaussian kernel)",              5000.0,  0.0, 100000.0)
gen.add("continuity_weight", double_t, 0, "Penalty on L2 deviation from previous tick best (0 to disable)",   50.0,   0.0, 10000.0)
gen.add("boundary_weight",   double_t, 0, "Soft-penalty for |n| near track half-width (0 to disable)",         0.0,    0.0, 10000.0)

# --- Tick-to-tick smoothing -----------------------------------------------------------------------
# 1-pole EMA on best-selected (d, V) between ticks; 1.0 = no filtering (pure instantaneous argmin),
# 0.0 = frozen on previous tick. Applied AFTER cost-based selection / MPPI blend.
gen.add("filter_alpha",      double_t, 0, "1-pole EMA on (d,V) vs previous tick (1=no filter, 0=frozen)",     0.7,    0.0, 1.0)

# --- MPPI-style blended selection ------------------------------------------------------------------
gen.add("mppi_enable",          bool_t,   0, "Use MPPI weighted blending instead of pure argmin",             False)
gen.add("mppi_temperature",     double_t, 0, "Softmax temperature (relative to cost spread; lower=peaked)",   0.25,  0.01, 5.0)
gen.add("mppi_temporal_weight", double_t, 0, "Extra penalty on deviation from previous blended trajectory",   0.0,   0.0,  10000.0)

# --- Output resampling ----------------------------------------------------------------------------
gen.add("resample_enable",   bool_t,   0, "Resample output waypoints to uniform arc-length spacing",           True)
gen.add("resample_ds_m",     double_t, 0, "Uniform arc-length spacing for output (meters)",                    0.1,    0.02, 1.0)

# --- YAML save / reset triggers (pattern from dynamic_statemachine_server.py) ---------------------
# Both are treated as one-shot triggers: the node resets them to False right after acting.
gen.add("save_params",       bool_t,   0, "One-shot: write current params to the instance YAML and flip off",  False)
gen.add("reset_params",      bool_t,   0, "One-shot: reload the instance YAML into rqt and flip off",          False)

exit(gen.generate(PACKAGE, PACKAGE, "SamplingCost"))
